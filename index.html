<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Graphics | Print Shop in Marsden Park, NSW</title>
  <meta
    name="description"
    content="Prime Graphics is a local print shop in Marsden Park, New South Wales offering business cards, flyers, brochures, posters, banners, document printing, corflute signs, and canvas prints."
  />
  <meta name="theme-color" content="#5f46d8" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #14213d;
      --muted: #5c677d;
      --purple: #6047d9;
      --cyan: #13a8d0;
      --yellow: #ffd84d;
      --dark: #111827;
      --card: #f8fafc;
      --border: #e5e7eb;
      --shadow: 0 20px 45px rgba(20, 33, 61, 0.12);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .section {
      padding: 88px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 0 0 0 6px rgba(255, 216, 77, 0.2);
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(2.6rem, 5vw, 4.8rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    h2 {
      font-size: clamp(2rem, 3.2vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    p.lead {
      font-size: clamp(1.05rem, 1.8vw, 1.25rem);
      color: rgba(255,255,255,0.9);
      max-width: 720px;
    }

    .subtext {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 760px;
    }

    .topbar {
      background: linear-gradient(90deg, var(--purple), #7a56ff);
      color: #fff;
      font-size: 0.95rem;
      padding: 10px 0;
    }

    .topbar .container {
      display: flex;
      justify-content: center;
      text-align: center;
      gap: 12px;
      font-weight: 700;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 78px;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
      font-weight: 700;
      color: var(--muted);
    }

    .nav-links a:hover {
      color: var(--purple);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 800;
      border: 0;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--yellow);
      color: #111;
      box-shadow: 0 12px 28px rgba(255, 216, 77, 0.35);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.24);
    }

    .btn-dark {
      background: var(--dark);
      color: #fff;
      box-shadow: 0 16px 32px rgba(17, 24, 39, 0.22);
    }

    .hero {
      position: relative;
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 216, 77, 0.24), transparent 18%),
        radial-gradient(circle at 85% 10%, rgba(19, 168, 208, 0.25), transparent 20%),
        linear-gradient(135deg, #5333ce 0%, #6245dc 30%, #1aa8cd 100%);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -120px auto;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      filter: blur(20px);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 40px;
      align-items: center;
      padding: 86px 0 100px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 30px 0 26px;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .hero-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(25, 34, 66, 0.2);
    }

    .hero-card-inner {
      background: #fff;
      color: var(--text);
      border-radius: 24px;
      padding: 28px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .metric {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
    }

    .metric strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1.15;
      margin-bottom: 6px;
      color: var(--purple);
    }

    .metric span {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
      margin-top: 40px;
    }

    .service-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 10px 28px rgba(20, 33, 61, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      font-size: 1.35rem;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(96,71,217,0.13), rgba(19,168,208,0.16));
    }

    .service-card p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .split {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 32px;
      align-items: stretch;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 32px;
      box-shadow: 0 16px 38px rgba(20, 33, 61, 0.07);
    }

    .feature-list {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .feature-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .feature-check {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      background: rgba(19,168,208,0.14);
      color: var(--cyan);
      flex: 0 0 auto;
    }

    .badge-box {
      display: grid;
      gap: 16px;
    }

    .quote-card {
      background: linear-gradient(135deg, var(--yellow), #ffef9c);
      border-radius: 30px;
      padding: 30px;
      color: #111;
      box-shadow: 0 22px 46px rgba(255, 216, 77, 0.25);
    }

    .quote-card p {
      margin-bottom: 20px;
    }

    .cta-stack {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .cta-stack a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 800;
      background: #fff;
      border: 1px solid rgba(17, 24, 39, 0.1);
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: 42px;
    }

    .process-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 28px;
      position: relative;
      box-shadow: 0 14px 34px rgba(20, 33, 61, 0.06);
    }

    .step {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      background: rgba(96,71,217,0.1);
      color: var(--purple);
    }

    .contact-wrap {
      background: linear-gradient(135deg, #0f172a, #162033 60%, #1c2f4a 100%);
      color: #fff;
      border-radius: 34px;
      padding: 34px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 28px;
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.28);
    }

    .contact-side p,
    .contact-side li {
      color: rgba(255,255,255,0.8);
    }

    .contact-list {
      display: grid;
      gap: 14px;
      margin: 24px 0;
      padding: 0;
      list-style: none;
    }

    .contact-list li {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
    }

    form {
      background: #fff;
      color: var(--text);
      border-radius: 28px;
      padding: 26px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(19, 168, 208, 0.12);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .full {
      grid-column: 1 / -1;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .success {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(34, 197, 94, 0.12);
      color: #0f7a38;
      font-weight: 700;
    }

    .success.show {
      display: block;
    }

    footer {
      padding: 28px 0 42px;
      color: var(--muted);
      font-weight: 600;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

      .split,
      .contact-wrap {
        grid-template-columns: 1fr;
      }

        grid-template-columns: repeat(2, minmax(0, 1fr));
